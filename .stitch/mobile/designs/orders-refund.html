<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {

                        "tertiary-container": "#e29100",
                        "tertiary-fixed": "#ffddb8",
                        "inverse-surface": "#d9e5df",
                        "surface-container-highest": "#2c3733",
                        "surface-container-high": "#222c29",
                        "secondary-fixed": "#68fcbf",
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface-tint": "#4edea3",
                        "inverse-primary": "#006c49",
                        "primary-fixed": "#6ffbbe",
                        "on-surface-variant": "#bbcabf",
                        "primary-container": "#10b981",
                        "on-tertiary": "#472a00",
                        "on-error": "#690005",
                        "outline-variant": "#3c4a42",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-variant": "#2c3733",
                        "surface-bright": "#313b38",
                        "surface-container": "#17221e",
                        "secondary": "#45dfa4",

                    "borderRadius": {

                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]

            },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
        .inset-glass {
            background: rgba(4, 13, 10, 0.4);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .glow-emerald {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#040d0a] text-on-surface font-body overflow-hidden selection:bg-primary/30">
<!-- Background Layer (Faint Orders List) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none p-6">
<div class="flex items-center justify-between mb-8">
<div class="h-8 w-32 bg-surface-container-highest rounded-full"></div>
<div class="h-8 w-8 bg-surface-container-highest rounded-full"></div>
</div>
<div class="space-y-4">
<div class="h-24 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-24 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-24 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-24 w-full bg-surface-container-low rounded-lg"></div>
</div>
</div>
<!-- Top App Bar (As defined in JSON, though mostly obscured) -->
<header class="fixed top-0 w-full z-50 bg-[#040d0a]/80 backdrop-blur-xl border-b border-emerald-500/10 flex justify-between items-center px-6 py-4 shadow-[0_0_40px_rgba(16,185,129,0.05)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-emerald-500 hover:bg-emerald-500/10 transition-colors p-2 rounded-full active:scale-95 duration-300">arrow_back</span>
<h1 class="font-['Inter'] font-extrabold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-[#10b981] to-[#34d399]">REFUND REQUEST</h1>
</div>
<span class="material-symbols-outlined text-emerald-500 hover:bg-emerald-500/10 transition-colors p-2 rounded-full active:scale-95 duration-300">help</span>
</header>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm"></div>
<!-- Bottom Sheet Container (390x844 Context) -->
<main class="fixed bottom-0 left-0 right-0 z-50 flex flex-col h-[85%] max-w-[390px] mx-auto glass-panel rounded-t-[28px] overflow-hidden">
<!-- Grab Handle -->
<div class="flex justify-center pt-3 pb-2">
<div class="w-12 h-1.5 bg-emerald-500/20 rounded-full"></div>
</div>
<!-- Sheet Content Scrollable Area -->
<div class="flex-1 overflow-y-auto px-6 pb-32 pt-2 custom-scrollbar">
<!-- Header Section -->
<div class="mb-6">
<h2 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#10b981] to-[#34d399] leading-tight">
                    Request Refund
                </h2>
<div class="font-mono text-emerald-500/60 text-xs tracking-widest mt-1">ORDER #ORD-9821</div>
</div>
<!-- Order Summary Strip -->
<div class="flex items-center justify-between p-4 mb-8 bg-emerald-500/5 rounded-2xl border border-emerald-500/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center p-1.5">
<img alt="Amazon Logo" class="w-full h-full object-contain" data-alt="amazon marketplace official logo icon in high resolution on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqy4HMP3XdPycYQUVZfEa7k58gmylKwIFVZj2gHjwNNjcTfwpmXOu2cP19IzoREhy-6a7MFLe02Ufg1nrshJJO6fN8QlLqiKDvGBiv1_a4tfowdJKzKPdz2IKql6j7YtKDqnjBhAVX1tsR_xy8yYcQCOL1_b0FhXPXcZCcwT1FwEf2jkeUS1v6-adWeOqjprJHN93MdOVK26ypAL0V44FABK4GLO7Tmn4DtDK8IvFPxWNj4brWNHrcHfP2xOySOFETWJm9c3aHeBZ2"/>
</div>
<span class="font-semibold text-on-surface">Amazon</span>
</div>
<span class="font-mono text-primary text-lg">$45.20</span>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Reason Dropdown -->
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest text-emerald-500/50 font-bold ml-1">Reason for Refund</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-highest/40 border border-emerald-500/10 rounded-full px-6 py-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary/40 transition-all cursor-pointer">
<option disabled="" selected="" value="">Select reason...</option>
<option>Not Received</option>
<option>Damaged</option>
<option>Wrong Item</option>
<option>Other</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-primary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Details Textarea -->
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest text-emerald-500/50 font-bold ml-1">Additional Details</label>
<textarea class="w-full inset-glass border border-emerald-500/10 rounded-[24px] px-6 py-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary/40 min-h-[100px] resize-none placeholder:text-emerald-900/40" placeholder="Please describe the issue in detail..."></textarea>
</div>
<!-- Proof Upload -->
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest text-emerald-500/50 font-bold ml-1">Evidence (Optional)</label>
<div class="w-full border-2 border-dashed border-emerald-500/20 bg-emerald-500/5 rounded-[24px] p-8 flex flex-col items-center justify-center gap-2 group cursor-pointer hover:bg-emerald-500/10 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl mb-1">cloud_upload</span>
<span class="font-mono text-xs text-primary font-bold">TAP TO UPLOAD</span>
<span class="text-[10px] text-emerald-500/40">JPG, PNG or PDF up to 10MB</span>
</div>
</div>
<!-- Refund Amount & Arrival -->
<div class="flex gap-4">
<div class="flex-1 space-y-2">
<label class="text-[10px] uppercase tracking-widest text-emerald-500/50 font-bold ml-1 text-nowrap">Refund Amount</label>
<div class="relative">
<input class="w-full font-mono bg-surface-container-highest/40 border border-emerald-500/10 rounded-2xl px-5 py-4 text-primary focus:outline-none" type="text" value="$45.20"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500/30 text-sm">lock</span>
</div>
</div>
<div class="flex-1 space-y-2">
<label class="text-[10px] uppercase tracking-widest text-emerald-500/50 font-bold ml-1 text-nowrap">Arrival Estimate</label>
<div class="w-full h-[58px] flex items-center justify-center font-mono text-[10px] bg-emerald-500/10 text-primary border border-emerald-500/20 rounded-2xl tracking-tighter text-center leading-tight">
                            REFUND IN:<br/>3-5 DAYS
                        </div>
</div>
</div>
</div>
</div>
<!-- Sticky Footer CTA -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#040d0a] via-[#040d0a]/90 to-transparent pt-10">
<button class="w-full py-5 bg-primary text-on-primary font-extrabold rounded-full flex items-center justify-center gap-2 glow-emerald active:scale-[0.98] transition-all group">
                SUBMIT REFUND REQUEST
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</div>
</main>
<!-- Bottom Navigation (As defined in JSON, but mostly suppressed as per UX mandate for focused tasks) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#2c3733]/40 backdrop-blur-lg border-t border-emerald-500/10 shadow-[0_-10px_40px_rgba(16,185,129,0.08)] rounded-t-[32px] md:hidden pointer-events-none opacity-0">
<div class="flex items-center justify-center text-emerald-700 p-3"><span class="material-symbols-outlined">account_balance_wallet</span></div>
<div class="flex items-center justify-center text-emerald-700 p-3"><span class="material-symbols-outlined">swap_horiz</span></div>
<div class="flex items-center justify-center text-emerald-700 p-3"><span class="material-symbols-outlined">history</span></div>
<div class="flex items-center justify-center text-emerald-700 p-3"><span class="material-symbols-outlined">person</span></div>
</nav>
<!-- Background Orbs for Glow -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full z-[-1]"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[100px] rounded-full z-[-1]"></div>
</body></html>
