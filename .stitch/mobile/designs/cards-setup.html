<style>
        body {
            background-color: #040d0a;
            color: #d9e5df;

            height: 100%;

        }

        .glass-panel {

<body class="font-body selection:bg-primary/30">
<div class="biolume-bg">
<div class="blob top-[-10%] left-[-10%]"></div>
<div class="blob bottom-[-10%] right-[-10%]"></div>
<div class="blob top-[30%] right-[10%]"></div>
<div class="blob bottom-[20%] left-[20%]"></div>

</button>

<button class="text-emerald-500 hover:bg-emerald-500/10 transition-all duration-300 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>

<main class="pt-24 pb-32 px-6 max-w-xl mx-auto space-y-10">

<div class="flex flex-col items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse shadow-[0_0_10px_rgba(78,222,163,0.8)]"></div>

<div class="flex-1 h-[1px] bg-emerald-500/10 mx-4"></div>

            </h2>

<div class="group">
<label class="block font-mono text-[11px] text-primary/60 mb-2 ml-4 uppercase tracking-widest">First Name</label>
<div class="glass-panel p-4 focus-within:border-primary/20 transition-all">

</div>
</div>
<div class="group">
<label class="block font-mono text-[11px] text-primary/60 mb-2 ml-4 uppercase tracking-widest">Middle Name</label>

</div>
</div>
<div class="group">
<label class="block font-mono text-[11px] text-primary/60 mb-2 ml-4 uppercase tracking-widest">Last Name</label>

<input class="w-full bg-transparent border-none p-0 text-on-surface font-mono placeholder:text-emerald-900/40 focus:ring-0 uppercase" placeholder="ENTER SURNAME" type="text"/>
</div>
</div>
</div>

<div class="group">
<label class="block font-mono text-[11px] text-primary/60 mb-2 ml-4 uppercase tracking-widest">Occupation</label>

<input class="w-full bg-transparent border-none p-0 text-on-surface font-mono placeholder:text-emerald-900/40 focus:ring-0 uppercase" placeholder="PROFESSIONAL TITLE" type="text"/>
</div>
</div>
<div>
<label class="block font-mono text-[11px] text-primary/60 mb-2 ml-4 uppercase tracking-widest">Gender</label>
<div class="flex gap-2">
<button class="flex-1 py-3 rounded-full bg-gradient-to-br from-primary to-secondary text-on-primary font-mono text-xs font-bold shadow-[0_0_20px_rgba(78,222,163,0.3)]">M</button>
<button class="flex-1 py-3 rounded-full glass-panel text-on-surface font-mono text-xs hover:bg-emerald-500/10 transition-colors">F</button>
<button class="flex-1 py-3 rounded-full glass-panel text-on-surface font-mono text-xs hover:bg-emerald-500/10 transition-colors">NB</button>
<button class="flex-1 py-3 rounded-full glass-panel text-on-surface font-mono text-xs hover:bg-emerald-500/10 transition-colors">OTHER</button>
</div>
</div>
</div>

<input class="w-full bg-transparent border-none p-0 text-center text-on-surface font-mono placeholder:text-emerald-900/40 focus:ring-0" placeholder="MM" type="text"/>

</div>
</div>

<button class="flex flex-col items-center justify-center text-emerald-900/50 hover:text-emerald-300 transition-colors active:scale-90 duration-300 ease-in-out">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['JetBrains_Mono'] text-[10px] font-bold tracking-tighter uppercase">HOME</span>
