<style>
        body {

            color: #d9e5df;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

            position: absolute;
            filter: blur(60px);
            opacity: 0.25;

        }

            background: rgba(44, 55, 51, 0.4);

        }

<body class="flex flex-col min-h-screen">
<!-- Living Background -->
<div class="living-bg">
<div class="blob w-[300px] h-[300px] bg-primary top-[-50px] left-[-50px]"></div>
<div class="blob w-[400px] h-[400px] bg-secondary bottom-[-100px] right-[-100px]"></div>
<div class="blob w-[250px] h-[250px] bg-emerald-900/50 top-[40%] right-[10%]"></div>
<div class="blob w-[350px] h-[350px] bg-teal-900/40 bottom-[20%] left-[-10%]"></div>
<div class="diagonal-lines absolute inset-0"></div>
</div>
<!-- Status Bar Spacer (iOS Style) -->
<div class="h-[44px] w-full shrink-0"></div>
<!-- TopAppBar Component (JSON Execution) -->

<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-emerald-500">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-[#10b981] to-[#34d399] tracking-tight text-xl">Profile</h1>
</div>
<button class="active:scale-95 transition-transform duration-200 text-emerald-500 p-2 hover:bg-emerald-500/10 rounded-full">
<span class="material-symbols-outlined">save</span>
</button>
</header>

<div class="w-[120px] h-[120px] rounded-full p-1 bg-gradient-to-tr from-primary to-secondary animate-pulse-slow">

<button class="absolute bottom-1 right-1 w-9 h-9 bg-primary text-on-primary rounded-full flex items-center justify-center border-4 border-[#040d0a] shadow-lg active:scale-90 transition-transform">

</button>
</div>
<div class="mt-4 space-y-1">

<div class="flex flex-col items-center gap-3 mt-4">

<span class="w-2 h-2 rounded-full bg-primary mr-2 animate-pulse"></span>
                        KYC VERIFIED

<p class="font-mono text-[10px] text-on-surface-variant uppercase tracking-widest">Member since Dec 2025</p>
</div>
</div>
</section>

<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center text-center">
<span class="text-[10px] text-on-surface-variant mb-1 font-semibold uppercase tracking-wider">Tier</span>
<span class="text-xs font-bold text-gradient">PLUS</span>
</div>
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center text-center">
<span class="text-[10px] text-on-surface-variant mb-1 font-semibold uppercase tracking-wider">Txn</span>
<span class="font-mono text-sm font-bold text-on-surface">142</span>
</div>
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center text-center">

</div>
</div>

</div>

</div>
</div>
</div>

</select>

</div>

</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="relative">

<div class="relative">
<select class="w-full bg-surface-container-lowest border-none rounded-lg h-14 px-5 appearance-none text-on-surface font-mono">

<button class="flex flex-col items-center justify-center text-[#d9e5df]/50 hover:text-emerald-300 transition-all">

<button class="flex flex-col items-center justify-center text-emerald-400 drop-shadow-[0_0_8px_rgba(16,185,129,0.6)] animate-pulse-slow">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">more_horiz</span>
<span class="font-['JetBrains_Mono'] text-[10px] tracking-widest uppercase">MORE</span>
</button>

<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-[134px] h-[5px] bg-white/20 rounded-full z-[60]"></div>
