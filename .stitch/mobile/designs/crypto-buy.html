<style>

            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);

        }

            background: linear-gradient(135deg, #10b981, #34d399);

<body class="flex items-center justify-center min-h-screen">
<!-- Mobile Screen Container (390x844) -->
<div class="relative w-[390px] h-[844px] bg-surface overflow-hidden shadow-2xl">
<!-- Background Blobs -->
<div class="absolute top-20 left-10 w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-40 right-10 w-80 h-80 bg-secondary/10 rounded-full blur-[100px]"></div>

<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">

<div class="space-y-6">

<div class="h-12 w-1/2 bg-surface-variant rounded-full"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 glass-panel rounded-lg"></div>
<div class="h-32 glass-panel rounded-lg"></div>
</div>
<div class="h-64 glass-panel rounded-lg"></div>
</div>
</div>

<div class="absolute inset-0 bg-black/40"></div>
<!-- Bottom Sheet -->

<div class="w-full flex justify-center pt-3 pb-6">

</div>

<div class="flex-1 px-6 overflow-y-auto">
<h1 class="text-3xl font-extrabold text-gradient mb-8">Buy Crypto</h1>

<div class="flex justify-between items-center mb-2">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">From</span>
<div class="flex items-center gap-1.5 px-3 py-1 bg-surface-container rounded-full">
<img alt="" class="w-4 h-4 rounded-full" data-alt="close up of a high quality circular american flag icon with realistic texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD3VC6mfVJ11jmFWx4ULOXb--3CEySoIC_-NQ3jPfZe39WZZAYCWYlnxsy4mpxfdTag2-bHI_XxWC6bnNoD4zqG0pWPRqxjvwc3X1r4BISXCJpuGofN_I4n8XWRx7rF0_MoP2PGPaVriKLrZ_yCdG0TgScLHNdqMOoLbaMrofjZDs7ynsjXrGUxe9PVK9t0dnAYTdb7BopRpAQ5n5ihG52yRM8H_A-VhFBTg1s-QlLufTtlW-0zR6lOQTH3-o7BiXmf1HlNBAk2TGg"/>

</div>
</div>
<!-- Swap Arrow -->
<div class="flex justify-center -my-3 relative z-10">
<div class="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-primary shadow-lg">
<span class="material-symbols-outlined text-xl">swap_vert</span>
</div>
</div>
<!-- TO Card -->

<div class="flex justify-between items-center mb-2">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">To</span>
<div class="flex items-center gap-1.5 px-3 py-1 bg-surface-container rounded-full cursor-pointer hover:bg-surface-variant transition-colors">
<img alt="" class="w-4 h-4 rounded-full bg-tertiary flex items-center justify-center text-[10px] font-bold text-on-tertiary" data-alt="close up of a digital bitcoin symbol rendered in gold 3d texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBNEQQSBMbyBGexOswIpSgEfgtDtlpVKDLT1P65oaw5JYwKjKUhNloiyLrskELM3TEroEqV869advh9bKBT6KhL2OWsd1FSvMd_Pb84IH1Jf6uYxseymO1QJKwel2WjwiBQp5UAnyOfnPOn2yMYhQ3ikPPIzrW-t_lwG52EisevJrcspGg700Mdjhrk4y7QpjC0htC6OZUAEm_fjzWTSpDdWR8klU8GUZI5dSxxe9FGmO2rSB82hN94r2Pr_HYfu2JTHvvK0PHkZYN"/>

</div>
<div class="mono text-2xl font-bold text-on-surface">
                        0.00149 <span class="text-sm font-medium opacity-60">BTC</span>
</div>
</div>

<div class="w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse"></div>
<span class="mono text-xs text-on-surface-variant">1 BTC = $67,241.30</span>
</div>
<!-- Funding Source -->
<div class="mb-8">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-3 px-1">Funding Source</span>
<div class="flex items-center justify-between p-4 glass-panel rounded-lg hover:bg-surface-variant transition-colors cursor-pointer">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
</div>
<div>
<p class="text-sm font-bold">E-Wallet</p>
<p class="mono text-xs text-primary">$12,458.32</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>

</button>

<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[134px] h-[5px] bg-on-surface/20 rounded-full"></div>
