<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=390, height=844, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#6ffbbe",
                        "surface-bright": "#313b38",
                        "primary-container": "#10b981",
                        "on-primary-fixed": "#002113",
                        "inverse-primary": "#006c49",
                        "surface-container-lowest": "#06100d",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#bbcabf",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-tertiary": "#472a00",
                        "surface-container": "#17221e",
                        "outline": "#86948a",
                        "on-secondary-fixed": "#002114",
                        "surface-container-low": "#131e1a",
                        "secondary-fixed": "#68fcbf",
                        "surface-dim": "#0b1512",
                        "error-container": "#93000a",
                        "surface-variant": "#2c3733",
                        "on-surface": "#d9e5df",
                        "on-tertiary-fixed": "#2a1700",
                        "on-secondary-fixed-variant": "#005137",
                        "surface-container-high": "#222c29",
                        "primary": "#4edea3",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#00452e",
                        "on-primary-container": "#00422b",
                        "tertiary": "#ffb95f",
                        "surface-container-highest": "#2c3733",
                        "on-tertiary-container": "#523200",
                        "outline-variant": "#3c4a42",
                        "surface-tint": "#4edea3",
                        "on-error": "#690005",
                        "on-background": "#d9e5df",
                        "tertiary-container": "#e29100",
                        "secondary-container": "#00bd85",
                        "primary-fixed-dim": "#4edea3",
                        "surface": "#0b1512",
                        "on-secondary": "#003825",
                        "inverse-on-surface": "#28332f",
                        "on-primary": "#003824",
                        "inverse-surface": "#d9e5df",
                        "secondary": "#45dfa4",
                        "secondary-fixed-dim": "#45dfa4",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed": "#ffddb8",
                        "background": "#0b1512"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body { background-color: #040d0a; color: #d9e5df; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(44, 55, 51, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.08); }
        .gradient-text { background: linear-gradient(to bottom, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .diagonal-lines { background-image: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.05) 0px, rgba(16, 185, 129, 0.05) 1px, transparent 1px, transparent 10px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="w-[390px] h-[844px] overflow-hidden relative">
<!-- Living Background Layer -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-primary/20 rounded-full blur-[60px]"></div>
<div class="absolute bottom-[10%] right-[-5%] w-[250px] h-[250px] bg-secondary/15 rounded-full blur-[60px]"></div>
<div class="absolute top-[40%] right-[10%] w-[200px] h-[200px] bg-primary/10 rounded-full blur-[60px]"></div>
<div class="absolute bottom-[-5%] left-[5%] w-[280px] h-[280px] bg-tertiary/10 rounded-full blur-[60px]"></div>
<div class="absolute inset-0 diagonal-lines opacity-30"></div>
</div>
<!-- Parent Screen (/cards) Dimmed -->
<div class="relative z-10 w-full h-full p-6 opacity-40 grayscale-[0.5]">
<!-- TopAppBar Placeholder -->
<div class="flex items-center justify-between h-16 w-full px-4 pt-4 mb-8">
<span class="material-symbols-outlined text-primary text-2xl">arrow_back</span>
<h1 class="font-headline font-extrabold tracking-tight uppercase text-xl gradient-text">Your Cards</h1>
<span class="material-symbols-outlined text-primary text-2xl">add</span>
</div>
<div class="space-y-6">
<div class="w-full h-48 glass rounded-lg flex items-center justify-center border-dashed border-primary/20">
<span class="font-mono text-primary/40">NO ACTIVE CARDS</span>
</div>
<div class="glass p-6 rounded-lg space-y-4">
<div class="h-4 w-1/2 bg-surface-container-highest rounded-full"></div>
<div class="h-4 w-3/4 bg-surface-container-highest rounded-full"></div>
</div>
</div>
</div>
<!-- Bottom Sheet Mask/Overlay -->
<div class="fixed inset-0 bg-black/60 z-20 backdrop-blur-sm"></div>
<!-- Activation Bottom Sheet -->
<div class="fixed bottom-0 left-0 w-full h-[92%] glass rounded-t-[28px] z-30 flex flex-col p-6 shadow-[0_-20px_60px_rgba(16,185,129,0.15)] overflow-hidden">
<!-- Grab Handle -->
<div class="w-12 h-1 bg-primary/20 rounded-full self-center mb-8"></div>
<!-- Header -->
<div class="text-center mb-8">
<h2 class="text-3xl font-headline font-extrabold gradient-text tracking-tight mb-2">Activate Your Card</h2>
<p class="font-mono text-[10px] text-primary/60 tracking-[0.2em] uppercase">ENTER DETAILS FROM PHYSICAL CARD</p>
</div>
<!-- Card Preview -->
<div class="flex justify-center mb-10">
<div class="w-[250px] h-[150px] rounded-[20px] relative overflow-hidden glass border-primary/10 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-highest to-surface-container-lowest"></div>
<div class="absolute top-4 left-4 w-8 h-6 bg-tertiary/20 rounded-md border border-tertiary/30"></div>
<div class="absolute top-4 right-4 flex space-x-[-10px]">
<div class="w-8 h-8 rounded-full bg-error/40 border border-error/20"></div>
<div class="w-8 h-8 rounded-full bg-tertiary/40 border border-tertiary/20"></div>
</div>
<div class="absolute bottom-10 left-4 font-mono text-sm tracking-widest text-primary/80">
                    5421 **** **** ****
                </div>
<div class="absolute bottom-4 left-4 font-mono text-[8px] text-on-surface-variant/60 uppercase">
                    Valued Member
                </div>
<!-- Bio-pulse element -->
<div class="absolute -right-4 -bottom-4 w-16 h-16 bg-primary/20 rounded-full blur-xl"></div>
</div>
</div>
<!-- Input Grid (16-digit) -->
<div class="grid grid-cols-4 gap-4 mb-8">
<!-- Group 1 -->
<div class="flex space-x-1">
<div class="w-10 h-12 glass border-primary/40 rounded-[10px] flex items-center justify-center font-mono text-primary font-bold">5</div>
<div class="w-10 h-12 glass border-primary/40 rounded-[10px] flex items-center justify-center font-mono text-primary font-bold">4</div>
<div class="w-10 h-12 glass border-primary/40 rounded-[10px] flex items-center justify-center font-mono text-primary font-bold">2</div>
<div class="w-10 h-12 glass border-primary/40 rounded-[10px] flex items-center justify-center font-mono text-primary font-bold">1</div>
</div>
<!-- Group 2 (Active Start) -->
<div class="flex space-x-1">
<div class="w-10 h-12 glass border-primary rounded-[10px] flex items-center justify-center font-mono text-primary relative overflow-hidden">
<div class="w-[2px] h-6 bg-primary animate-pulse"></div>
</div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
</div>
<!-- Group 3 -->
<div class="flex space-x-1">
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
</div>
<!-- Group 4 -->
<div class="flex space-x-1">
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
<div class="w-10 h-12 glass border-primary/10 rounded-[10px]"></div>
</div>
</div>
<!-- Expiry & CVV -->
<div class="flex space-x-6 mb-8">
<div class="flex-1">
<label class="block font-mono text-[9px] text-primary/60 tracking-widest mb-2 uppercase">Expiry MM/YY</label>
<div class="flex space-x-2">
<div class="flex-1 h-12 glass rounded-full flex items-center px-4 font-mono text-on-surface/40">MM</div>
<div class="flex-1 h-12 glass rounded-full flex items-center px-4 font-mono text-on-surface/40">YY</div>
</div>
</div>
<div class="w-1/3">
<label class="block font-mono text-[9px] text-primary/60 tracking-widest mb-2 uppercase">CVV</label>
<div class="h-12 glass rounded-full flex items-center px-4 font-mono text-on-surface/40">***</div>
</div>
</div>
<div class="flex items-center justify-center space-x-2 mb-12">
<span class="material-symbols-outlined text-primary/40 text-sm">info</span>
<p class="font-mono text-[9px] text-primary/40 tracking-wider uppercase">FIND ON FRONT OF CARD</p>
</div>
<!-- CTA -->
<button class="w-full h-14 bg-primary text-on-primary font-headline font-extrabold rounded-full flex items-center justify-center space-x-3 shadow-[0_10px_20px_rgba(16,185,129,0.3)] active:scale-95 transition-transform duration-300">
<span>ACTIVATE</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Bottom Navigation Layer (Always on top for UI context) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#2c3733]/40 backdrop-blur-xl rounded-t-[32px] border-t border-emerald-500/10 shadow-[0_-10px_40px_rgba(16,185,129,0.1)] pointer-events-none">
<div class="flex flex-col items-center justify-center text-emerald-900/60 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-mono text-[10px] uppercase tracking-widest mt-1">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-400 drop-shadow-[0_0_8px_rgba(16,185,129,0.6)] transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">credit_card</span>
<span class="font-mono text-[10px] uppercase tracking-widest mt-1">Cards</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-900/60 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined">swap_horiz</span>
<span class="font-mono text-[10px] uppercase tracking-widest mt-1">Transact</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-900/60 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined">person</span>
<span class="font-mono text-[10px] uppercase tracking-widest mt-1">Profile</span>
</div>
</nav>
</body></html>
