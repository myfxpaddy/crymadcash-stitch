<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
        .inset-glass {
            background: rgba(6, 16, 13, 0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .text-gradient {
            background: linear-gradient(to bottom, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-living {
            background-color: #040d0a;
            position: relative;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #10b981;
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
        }
        .energy-lines {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(16, 185, 129, 0.03) 40px, rgba(16, 185, 129, 0.03) 41px);
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<div class="absolute inset-0 energy-lines pointer-events-none"></div>
<div class="blob -top-20 -left-20"></div>
<div class="blob top-1/2 -right-20"></div>
<div class="blob -bottom-20 left-1/4"></div>

<div class="opacity-30 pointer-events-none px-6 pt-16">

<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>

<div class="h-16 w-full glass-panel rounded-lg"></div>

</div>
</div>

<div class="absolute bottom-0 left-0 right-0 h-[90%] glass-panel rounded-t-xl z-50 flex flex-col shadow-[0_-10px_60px_rgba(0,0,0,0.5)]">
<!-- Grab Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1 bg-surface-variant rounded-full opacity-50"></div>
</div>
<!-- Sheet Header -->
<div class="px-6 pb-4">
<h1 class="text-gradient text-3xl font-headline font-extrabold tracking-tight uppercase">Send Payment</h1>
</div>
<div class="flex-1 overflow-y-auto px-6 pb-32 space-y-6">
<!-- Payment Type Pills -->
<div class="flex gap-2">
<button class="px-5 py-2 rounded-full bg-primary text-on-primary font-headline font-bold text-xs tracking-widest transition-all">ACH</button>
<button class="px-5 py-2 rounded-full glass-panel text-on-surface-variant font-headline font-bold text-xs tracking-widest hover:bg-white/5 transition-all">WIRE</button>
<button class="px-5 py-2 rounded-full glass-panel text-on-surface-variant font-headline font-bold text-xs tracking-widest hover:bg-white/5 transition-all">SEPA</button>
</div>

<div class="py-4 text-center">
<div class="text-[10px] font-mono text-primary uppercase tracking-[0.2em] mb-1">Enter Amount</div>
<div class="text-gradient text-5xl font-mono font-bold tracking-tighter">
                    $5,000.00
                </div>
</div>

<div class="space-y-4">
<div class="space-y-2">
<label class="text-[10px] font-headline font-semibold text-outline tracking-widest uppercase ml-1">Recipient Name</label>

</div>
</div>
<div class="space-y-2">

</div>

<span class="text-sm font-mono text-primary">122105155</span>
</div>
<div class="flex justify-between items-center">
<span class="text-xs text-on-surface-variant">Account</span>
<span class="text-sm font-mono text-primary">.... 4421</span>
</div>
</div>
</div>
<div class="space-y-2">

<div class="inset-glass rounded-lg px-4 py-4 border border-white/5">
<span class="text-on-surface-variant font-headline text-sm italic">Invoice #2842</span>
</div>
</div>
</div>

<h3 class="text-[10px] font-headline font-bold text-outline tracking-[0.2em] uppercase mb-4">Fee Breakdown</h3>
<div class="space-y-3 font-mono text-xs">
<div class="flex justify-between">
<span class="text-on-surface-variant">Amount</span>
<span class="text-on-surface">$5,000.00</span>
</div>
<div class="flex justify-between">
<span class="text-on-surface-variant">ACH Fee</span>

</div>

</div>

<span class="text-gradient text-lg font-bold tracking-tight">$5,001.75</span>
</div>
</div>
</div>
