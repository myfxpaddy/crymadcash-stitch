<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#040d0a",
              "surface-container-low": "#131e1a",
              "on-tertiary": "#472a00",
              "on-secondary": "#003825",
              "on-background": "#d9e5df",
              "error-container": "#93000a",
              "tertiary-fixed": "#ffddb8",
              "surface": "#040d0a",
              "primary-fixed": "#6ffbbe",
              "secondary": "#34d399",
              "surface-container": "#17221e",
              "secondary-fixed": "#68fcbf",
              "on-error": "#690005",
              "surface-variant": "#2c3733",
              "surface-bright": "#313b38",
              "on-surface-variant": "#bbcabf",
              "on-primary-fixed-variant": "#005236",
              "on-secondary-fixed": "#002114",
              "inverse-primary": "#006c49",
              "inverse-surface": "#d9e5df",
              "tertiary": "#f59e0b",
              "on-primary": "#003824",
              "inverse-on-surface": "#28332f",
              "primary": "#10b981",
              "surface-tint": "#10b981",
              "on-primary-fixed": "#002113",
              "secondary-container": "#00bd85",
              "on-tertiary-fixed-variant": "#653e00",
              "on-error-container": "#ffdad6",
              "surface-container-highest": "#2c3733",
              "primary-fixed-dim": "#10b981",
              "outline": "#86948a",
              "surface-container-high": "#222c29",
              "outline-variant": "#3c4a42",
              "on-tertiary-fixed": "#2a1700",
              "on-primary-container": "#00422b",
              "on-secondary-fixed-variant": "#005137",
              "secondary-fixed-dim": "#34d399",
              "on-secondary-container": "#00452e",
              "tertiary-fixed-dim": "#f59e0b",
              "tertiary-container": "#e29100",
              "error": "#ffb4ab",
              "primary-container": "#10b981",
              "on-tertiary-container": "#523200",
              "on-surface": "#d9e5df",
              "surface-container-lowest": "#06100d",
              "surface-dim": "#040d0a"
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "1.5rem",
              "xl": "1.75rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
        .text-gradient {
            background: linear-gradient(to bottom, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .diagonal-lines {
            background-image: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.05) 0, rgba(16, 185, 129, 0.05) 1px, transparent 0, transparent 50%);
            background-size: 10px 10px;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .animate-ring {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .animate-ring-delayed {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite 1.5s;
        }
        @keyframes float-particle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) translateX(20px); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #34d399;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 8px #10b981;
            animation: float-particle 4s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 overflow-hidden">
<!-- Living Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-[60px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-secondary/20 rounded-full blur-[60px]"></div>
<div class="absolute top-[30%] right-[10%] w-48 h-48 bg-primary/10 rounded-full blur-[60px]"></div>
<div class="absolute bottom-[20%] left-[15%] w-56 h-56 bg-secondary/15 rounded-full blur-[60px]"></div>
<div class="absolute inset-0 diagonal-lines opacity-10"></div>
</div>
<!-- Main Canvas -->
<div class="relative z-10 w-full h-screen max-w-[390px] mx-auto flex flex-col overflow-hidden">
<!-- Status Bar -->
<div class="flex justify-between items-center px-8 py-4 w-full">
<span class="font-mono text-sm font-bold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 w-full">
<button class="w-10 h-10 flex items-center justify-center glass rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex-1 text-center">
<span class="font-headline font-extrabold uppercase tracking-widest text-xl font-black bg-clip-text text-transparent bg-gradient-to-b from-primary to-secondary">CRYMAD CA$H</span>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-12 text-center">
<!-- Animated Icon Section -->
<div class="relative w-full flex justify-center items-center mb-10">
<!-- Concentric Rings -->
<div class="absolute w-[220px] h-[220px] rounded-full border border-primary/20 animate-ring"></div>
<div class="absolute w-[220px] h-[220px] rounded-full border border-secondary/10 animate-ring-delayed"></div>
<!-- Particles -->
<div class="particle" style="top: 20%; left: 30%; animation-delay: 0.5s;"></div>
<div class="particle" style="top: 40%; left: 20%; animation-delay: 1.2s;"></div>
<div class="particle" style="top: 10%; left: 70%; animation-delay: 0.8s;"></div>
<div class="particle" style="top: 60%; left: 80%; animation-delay: 2.1s;"></div>
<div class="particle" style="top: 80%; left: 40%; animation-delay: 1.5s;"></div>
<div class="particle" style="top: 30%; left: 85%; animation-delay: 3.0s;"></div>
<!-- Envelope SVG -->
<div class="relative z-10">
<svg class="drop-shadow-[0_0_15px_rgba(16,185,129,0.4)]" fill="none" height="140" viewbox="0 0 24 24" width="140" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
<path d="M22 6L12 13L2 6" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
</svg>
</div>
</div>
<!-- Typography & Info -->
<h1 class="text-[28px] font-headline font-extrabold text-gradient mb-2">Check Your Email</h1>
<p class="font-mono text-[10px] tracking-[0.3em] text-secondary mb-6">VERIFICATION LINK SENT</p>
<!-- Email Pill -->
<div class="glass px-4 py-2 rounded-full flex items-center gap-2 mb-8 group active:scale-95 transition-transform duration-200 cursor-pointer">
<span class="font-mono text-sm text-primary">joseph@crymadcash.io</span>
<span class="material-symbols-outlined text-sm text-primary/60 group-hover:text-primary transition-colors">content_copy</span>
</div>
<p class="text-[13px] text-on-surface-variant max-w-[280px] leading-relaxed mb-10">
                Click the link in the email to activate your bioluminescent wallet. The link expires in <span class="font-mono font-bold text-on-background">15 minutes</span>.
            </p>
<!-- Countdown Timer -->
<div class="glass px-4 py-2 rounded-full flex items-center gap-3 mb-12">
<span class="font-mono text-xs text-on-surface flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_8px_#f59e0b] animate-pulse"></span>
                    RESEND IN 00<span class="animate-[pulse_1s_infinite]">:</span>47
                </span>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary/40 rounded-lg flex items-center justify-center gap-3 cursor-not-allowed mb-6" disabled="">
<span class="material-symbols-outlined text-on-primary">lock</span>
<span class="font-headline font-bold text-on-primary uppercase tracking-wider">RESEND EMAIL</span>
</button>
<!-- Footer Link -->
<button class="flex items-center gap-2 text-on-surface-variant font-mono text-[11px] hover:text-primary transition-colors group">
                Change Email Address
                <span class="material-symbols-outlined text-[14px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</main>
<!-- Home Indicator -->
<div class="w-full flex justify-center pb-2 pt-4">
<div class="w-32 h-1.5 bg-on-surface/10 rounded-full"></div>
</div>
</div>
</body></html>
