<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>

<button class="flex flex-col text-left p-4 bg-surface-container-highest/40 hover:bg-surface-container-highest/80 border border-emerald-500/5 rounded-lg transition-all duration-300 group">

<span class="material-symbols-outlined text-emerald-500 mb-3 group-hover:scale-110 transition-transform" data-icon="gavel">gavel</span>
<span class="font-bold text-sm tracking-tight mb-1">LLC</span>
<span class="text-[11px] text-on-surface-variant leading-tight mb-4 flex-grow">Flexible structure for smaller scale or local ventures.</span>
<span class="font-mono text-[9px] text-emerald-500/70 border-t border-emerald-500/10 pt-2">$1M-$50M AUM</span>

<span class="text-[11px] text-on-surface-variant leading-tight mb-4 flex-grow">Private wealth management for high-net-worth families.</span>
<span class="font-mono text-[9px] text-emerald-500/70 border-t border-emerald-500/10 pt-2">$100M+ AUM</span>

<span class="font-mono text-[9px] text-emerald-500/70 border-t border-emerald-500/10 pt-2">$1M+ AUM</span>
</button>

<span class="font-mono text-[9px] text-emerald-500/70 border-t border-emerald-500/10 pt-2">$500K+ AUM</span>
