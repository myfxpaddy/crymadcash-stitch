<style>
        body {
            background-color: #0b1512;
            color: #d9e5df;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 390px;
            height: 844px;

            position: fixed;

        }

        }

            background: rgba(44, 55, 51, 0.4);

            background: linear-gradient(to bottom, #10b981, #34d399);

        }
        .otp-input {
            width: 48px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 20px;
            border-radius: 12px;
        }
        .cursor-pulse {
            width: 2px;
            height: 24px;
            background-color: #10b981;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {

<body class="flex flex-col items-center">
