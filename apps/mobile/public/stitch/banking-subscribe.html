<style>
        .glass-sheet {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);

            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15) 0%, transparent 70%);

<body class="bg-[#040d0a] text-on-surface font-body min-h-screen overflow-hidden">
<!-- Parent Screen Backdrop (Simulated /banking route) -->
<div class="fixed inset-0 z-0 opacity-40 p-6 flex flex-col gap-6 pointer-events-none">
<header class="flex justify-between items-center py-4">
<div class="h-10 w-32 bg-surface-container-highest rounded-lg"></div>
<div class="h-10 w-10 bg-surface-container-highest rounded-full"></div>
</header>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-surface-container-low rounded-lg"></div>
<div class="h-32 bg-surface-container-low rounded-lg"></div>
</div>
<div class="h-64 bg-surface-container-low rounded-lg w-full"></div>
</div>
<!-- Dark Overlay -->
<div class="fixed inset-0 bg-black/60 z-10"></div>
<!-- Bottom Sheet Container -->
<div class="fixed inset-x-0 bottom-0 z-20 flex flex-col items-center justify-end h-[85%]">
<!-- The Bottom Sheet -->
<div class="glass-sheet w-full h-full rounded-t-[28px] flex flex-col overflow-hidden relative">
<!-- Grab Handle -->
<div class="flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-on-surface-variant/20 rounded-full"></div>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto px-6 pb-24">
<!-- Header Section -->
<div class="mt-4 mb-8 text-center">
<p class="font-mono text-xs tracking-[0.2em] text-secondary/60 mb-2">JOIN PERSONAL BANKING</p>
<h1 class="text-3xl font-extrabold text-gradient leading-tight">Activate Banking</h1>
</div>
<!-- Pricing Glass Card -->
<div class="bg-surface-container-lowest/60 border border-primary/10 rounded-lg p-6 mb-8 text-center relative overflow-hidden">
<div class="absolute inset-0 bioluminescent-glow"></div>
<div class="relative z-10">
<div class="flex items-baseline justify-center gap-1">
<span class="text-gradient text-5xl font-extrabold tracking-tighter">$9.00</span>
</div>
<p class="font-mono text-[10px] text-on-surface-variant mt-2 tracking-widest uppercase">+$4.95 MONTHLY MAINTENANCE</p>
</div>
</div>
<!-- Benefits List -->
<div class="space-y-4 mb-10">
<div class="flex items-center gap-4 group">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-on-surface-variant font-semibold">Receive deposits</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-on-surface-variant font-semibold">Send wires</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-on-surface-variant font-semibold">Treasury yield</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">

</div>
<span class="text-on-surface-variant font-semibold">Real-time ACH</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-on-surface-variant font-semibold">Global payments</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-on-surface-variant font-semibold">Tax reporting</span>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 px-2 mb-8">
<div class="relative flex items-center">
<input checked="" class="w-6 h-6 rounded bg-surface-container-highest border-primary/20 text-primary focus:ring-primary focus:ring-offset-background cursor-pointer" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant/80">I agree to Banking Terms</label>
</div>

<div class="flex justify-center mb-8">
<div class="inline-flex items-center gap-3 bg-surface-container-highest/80 px-6 py-3 rounded-full border border-primary/5">
<span class="material-symbols-outlined text-primary-fixed text-lg">account_balance_wallet</span>
<span class="font-mono text-sm text-primary-fixed">Pay from E-Wallet <span class="font-bold">$12,458.32</span></span>
</div>
</div>
</div>
<!-- CTA Bottom Area -->
<div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-[#0b1512] to-transparent pt-10">
<button class="w-full bg-primary py-5 rounded-lg flex items-center justify-center gap-3 hover:brightness-110 active:scale-95 transition-all shadow-[0_0_30px_rgba(78,222,163,0.3)] group">
<span class="text-on-primary font-black uppercase tracking-widest">ACTIVATE BANKING</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</div>

<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[100px] -z-10 rounded-full"></div>
