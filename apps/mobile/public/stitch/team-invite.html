<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=390, height=844, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary-fixed-variant": "#005236",
            "primary-fixed-dim": "#4edea3",
            "primary-container": "#10b981",
            "surface-dim": "#0b1512",
            "tertiary-fixed-dim": "#ffb95f",
            "on-primary": "#003824",
            "on-tertiary-fixed-variant": "#653e00",
            "secondary-container": "#00bd85",
            "inverse-surface": "#d9e5df",
            "surface-bright": "#313b38",
            "background": "#0b1512",
            "outline": "#86948a",
            "on-primary-container": "#00422b",
            "error": "#ffb4ab",
            "surface-container-high": "#222c29",
            "tertiary-container": "#e29100",
            "error-container": "#93000a",
            "on-error-container": "#ffdad6",
            "primary-fixed": "#6ffbbe",
            "tertiary": "#ffb95f",
            "surface-tint": "#4edea3",
            "outline-variant": "#3c4a42",
            "on-surface": "#d9e5df",
            "surface-container-highest": "#2c3733",
            "on-error": "#690005",
            "on-secondary": "#003825",
            "on-primary-fixed": "#002113",
            "tertiary-fixed": "#ffddb8",
            "surface": "#0b1512",
            "secondary-fixed": "#68fcbf",
            "inverse-on-surface": "#28332f",
            "on-tertiary-fixed": "#2a1700",
            "surface-container": "#17221e",
            "secondary": "#45dfa4",
            "on-secondary-container": "#00452e",
            "surface-container-low": "#131e1a",
            "secondary-fixed-dim": "#45dfa4",
            "surface-variant": "#2c3733",
            "on-secondary-fixed": "#002114",
            "on-background": "#d9e5df",
            "inverse-primary": "#006c49",
            "surface-container-lowest": "#06100d",
            "on-tertiary": "#472a00",
            "primary": "#4edea3",
            "on-surface-variant": "#bbcabf",
            "on-secondary-fixed-variant": "#005137",
            "on-tertiary-container": "#523200"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"],
            "mono": ["JetBrains Mono"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
      background: rgba(44, 55, 51, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.08);
    }
    .inset-glass {
      background: rgba(6, 16, 13, 0.6);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
    }
    .living-blob {
      filter: blur(60px);
      opacity: 0.25;
      position: absolute;
      z-index: 0;
    }
    .diagonal-lines {
      background-image: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.05) 0px, rgba(16, 185, 129, 0.05) 1px, transparent 1px, transparent 10px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Living Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="diagonal-lines absolute inset-0 opacity-40"></div>
<div class="living-blob w-64 h-64 bg-primary top-[-50px] left-[-50px]"></div>
<div class="living-blob w-72 h-72 bg-secondary bottom-[-80px] right-[-40px]"></div>
<div class="living-blob w-48 h-48 bg-tertiary top-1/2 left-1/4"></div>
<div class="living-blob w-80 h-80 bg-primary-container bottom-1/4 right-1/3"></div>
</div>
<!-- Parent Screen Mockup (Dimmed Content) -->
<div class="w-full max-w-[390px] h-[844px] relative bg-background/60 brightness-[0.3] flex flex-col p-6 pointer-events-none">
<div class="flex justify-between items-center mb-8">
<div class="text-2xl font-extrabold uppercase tracking-tight text-primary">Team Management</div>
<span class="material-symbols-outlined text-outline">settings</span>
</div>
<div class="space-y-4">
<div class="h-24 glass-panel rounded-lg"></div>
<div class="h-24 glass-panel rounded-lg"></div>
<div class="h-24 glass-panel rounded-lg"></div>
</div>
</div>
<!-- Bottom Sheet Overlay -->
<div class="absolute inset-0 z-50 flex flex-col justify-end">
<!-- Semi-transparent backdrop -->
<div class="absolute inset-0 bg-background/20 backdrop-blur-sm"></div>
<!-- The Bottom Sheet -->
<div class="glass-panel w-full h-[85%] rounded-t-[28px] flex flex-col relative z-10 shadow-[0_-10px_40px_rgba(16,185,129,0.12)]">
<!-- Grab Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-10 h-1 rounded-full bg-outline-variant/50"></div>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-6 pb-24">
<!-- Header -->
<h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-primary-container to-secondary bg-clip-text text-transparent mb-8">
          Invite Team Member
        </h1>
<!-- Email Field -->
<div class="mb-6">
<label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-widest mb-3 px-1">Colleague Email</label>
<div class="inset-glass rounded-[24px] px-6 py-4 flex items-center border border-primary/5">
<span class="material-symbols-outlined text-primary/40 mr-3">alternate_email</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-mono placeholder:text-outline-variant/60" placeholder="colleague@company.com" type="text"/>
</div>
</div>
<!-- Role Selector -->
<div class="mb-8">
<label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-widest mb-3 px-1">Select Role</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full glass-panel text-[10px] font-bold tracking-widest text-outline-variant hover:text-primary transition-colors uppercase">ADMIN</button>
<button class="px-4 py-2 rounded-full bg-primary/20 border border-primary/40 text-[10px] font-bold tracking-widest text-primary shadow-[0_0_12px_rgba(16,185,129,0.3)] transition-colors uppercase">MANAGER</button>
<button class="px-4 py-2 rounded-full glass-panel text-[10px] font-bold tracking-widest text-outline-variant hover:text-primary transition-colors uppercase">VIEWER</button>
<button class="px-4 py-2 rounded-full glass-panel text-[10px] font-bold tracking-widest text-outline-variant hover:text-primary transition-colors uppercase">ACCOUNTANT</button>
</div>
</div>
<!-- Permissions Card -->
<div class="mb-8">
<label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-widest mb-3 px-1">Specific Permissions</label>
<div class="glass-panel p-5 rounded-[24px] grid grid-cols-1 gap-3">
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-on-surface/90">View Transactions</span>
<div class="w-10 h-6 bg-primary/30 rounded-full flex items-center px-1 border border-primary/50">
<div class="w-4 h-4 bg-primary rounded-full translate-x-4 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-on-surface/90">Create Payouts</span>
<div class="w-10 h-6 bg-primary/30 rounded-full flex items-center px-1 border border-primary/50">
<div class="w-4 h-4 bg-primary rounded-full translate-x-4 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-on-surface/90">Manage Team</span>
<div class="w-10 h-6 bg-primary/30 rounded-full flex items-center px-1 border border-primary/50">
<div class="w-4 h-4 bg-primary rounded-full translate-x-4 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-outline-variant">Access Reports</span>
<div class="w-10 h-6 bg-surface-container-lowest rounded-full flex items-center px-1 border border-outline-variant/30">
<div class="w-4 h-4 bg-outline-variant/50 rounded-full"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-outline-variant">Manage API Keys</span>
<div class="w-10 h-6 bg-surface-container-lowest rounded-full flex items-center px-1 border border-outline-variant/30">
<div class="w-4 h-4 bg-outline-variant/50 rounded-full"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-outline-variant">View Audit Log</span>
<div class="w-10 h-6 bg-surface-container-lowest rounded-full flex items-center px-1 border border-outline-variant/30">
<div class="w-4 h-4 bg-outline-variant/50 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Personal Message -->
<div class="mb-6">
<label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-widest mb-3 px-1">Personal Message</label>
<div class="inset-glass rounded-[24px] px-6 py-4 flex items-center border border-primary/5">
<textarea class="bg-transparent border-none focus:ring-0 w-full text-on-surface text-sm placeholder:text-outline-variant/60 resize-none" placeholder="Welcome to the team! Here's access to your dashboard..." rows="3"></textarea>
</div>
</div>
<!-- Expiration -->
<div class="mb-4">
<div class="inline-flex items-center px-4 py-2 glass-panel rounded-full text-[10px] font-bold tracking-widest text-primary/80 uppercase">
<span class="material-symbols-outlined text-[14px] mr-2">timer</span>
            Invite expires in: 7 days
            <span class="material-symbols-outlined text-[14px] ml-2">expand_more</span>
</div>
</div>
</div>
<!-- Action Button (Fixed to bottom of sheet) -->
<div class="absolute bottom-0 w-full px-6 pt-4 pb-8 glass-panel border-none shadow-none">
<button class="w-full h-16 rounded-full bg-primary text-on-primary font-extrabold tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-[0_4px_20px_rgba(16,185,129,0.4)]">
          SEND INVITE
          <span class="material-symbols-outlined font-black">arrow_forward</span>
</button>
<!-- Home Indicator Mock -->
<div class="w-32 h-1.5 bg-on-surface/10 rounded-full mx-auto mt-6"></div>
</div>
</div>
</div>
</body></html>
