<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          extend: {

                    "inverse-surface": "#d9e5df",

                    "surface": "#0b1512",

                    "secondary": "#45dfa4",

                    "on-secondary": "#003825",

                    "surface-tint": "#4edea3",

                    "primary-fixed-dim": "#4edea3",
                    "surface-dim": "#0b1512",
                    "error": "#ffb4ab",
                    "surface-container-lowest": "#06100d",
                    "secondary-container": "#00bd85",

            "fontFamily": {

                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"],
                    "mono": ["JetBrains Mono", "monospace"]

          },

<style>
        .glass-panel {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
        .energy-lines {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(16, 185, 129, 0.05) 40px, rgba(16, 185, 129, 0.05) 41px);
        }
        .text-gradient {
            background: linear-gradient(to bottom, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .breathe-ring {
            animation: ring-pulse 4s ease-in-out infinite;
        }
        @keyframes ring-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#040d0a] text-on-surface font-body overflow-hidden selection:bg-primary/30">
<!-- Ambient Background blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-primary/20 blur-[60px] rounded-full"></div>
<div class="absolute top-[20%] right-[-10%] w-[250px] h-[250px] bg-secondary/15 blur-[60px] rounded-full"></div>
<div class="absolute bottom-[10%] left-[5%] w-[350px] h-[350px] bg-primary/10 blur-[60px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[5%] w-[280px] h-[280px] bg-secondary/20 blur-[60px] rounded-full"></div>
<div class="absolute inset-0 energy-lines"></div>
</div>
<!-- Main Viewport (390x844) -->
<main class="relative w-full max-w-[390px] h-screen max-h-[844px] mx-auto flex flex-col px-6 overflow-y-auto no-scrollbar">
<!-- Status Bar Placeholder -->
<div class="flex justify-between items-center h-[44px] shrink-0">
<span class="font-mono text-[12px] font-bold text-on-surface">9:41</span>
<div class="flex gap-1">
<span class="material-symbols-outlined text-[14px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
<!-- Top App Bar (From Shared Components Protocol) -->
<header class="flex items-center justify-between w-full pt-6 pb-4">
<div class="flex flex-col items-center w-full">
<h1 class="text-[32px] font-extrabold uppercase tracking-tighter font-headline text-gradient leading-none">CRYMAD CA$H</h1>
<p class="font-mono text-[10px] tracking-[0.3em] text-primary mt-2 uppercase opacity-80">DIGITAL FINANCE PLATFORM</p>
</div>
</header>
<!-- Circular Orb Graphic -->
<div class="flex justify-center my-8">
<div class="relative w-[120px] h-[120px] flex items-center justify-center">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full breathe-ring" viewbox="0 0 100 100">
<defs>
<lineargradient id="ringGrad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#10b981;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#34d399;stop-opacity:0.2"></stop>
</lineargradient>
</defs>
<circle cx="50" cy="50" fill="none" r="48" stroke="url(#ringGrad)" stroke-dasharray="15, 5" stroke-width="2"></circle>
</svg>
<div class="glass-panel w-[80px] h-[80px] rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.2)]">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="fingerprint">fingerprint</span>
</div>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-col mb-8">
<h2 class="text-[28px] font-extrabold font-headline text-gradient leading-tight">Welcome Back</h2>
<p class="text-[14px] text-on-surface opacity-70 mt-1">Sign in to your bioluminescent wallet</p>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-mono text-[11px] tracking-widest text-primary ml-1 uppercase">EMAIL</label>
<div class="glass-panel h-[56px] rounded-[20px] flex items-center px-5 focus-within:ring-1 focus-within:ring-primary/40 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 font-mono text-[14px] text-on-surface placeholder:text-on-surface/30" placeholder="you@crymadcash.io" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-mono text-[11px] tracking-widest text-primary ml-1 uppercase">PASSWORD</label>
<div class="glass-panel h-[56px] rounded-[20px] flex items-center px-5 focus-within:ring-1 focus-within:ring-primary/40 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 font-mono text-[14px] text-on-surface placeholder:text-on-surface/30" type="password" value="password"/>
<span class="material-symbols-outlined text-on-surface/50 cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Form Footer Row -->
<div class="flex justify-between items-center pt-1 px-1">
<div class="flex items-center gap-2 glass-panel py-1.5 px-3 rounded-full">
<div class="w-3.5 h-3.5 rounded-sm border border-primary/40 flex items-center justify-center">
<div class="w-2 h-2 bg-primary rounded-sm opacity-0 active:opacity-100 transition-opacity"></div>
</div>
<span class="font-mono text-[10px] text-on-surface/80 uppercase">Remember me</span>
</div>
<a class="font-mono text-[10px] text-primary hover:text-secondary transition-colors uppercase" href="#">Forgot Password? →</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-[56px] bg-primary-container text-on-primary-container font-headline font-bold text-[14px] rounded-full uppercase tracking-widest shadow-[0_8px_25px_rgba(16,185,129,0.3)] hover:shadow-[0_8px_35px_rgba(16,185,129,0.5)] active:scale-95 transition-all mt-6">
                SIGN IN →
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-1 border-t border-dashed border-on-surface/20"></div>
<span class="font-mono text-[11px] text-on-surface/40 uppercase">OR</span>
<div class="flex-1 border-t border-dashed border-on-surface/20"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="glass-panel h-[50px] rounded-[20px] flex items-center justify-center gap-2 hover:bg-white/5 transition-colors">
<img alt="Google" class="w-5 h-5 opacity-80" data-alt="google logo minimalist icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1qd9dDYdzJ3PbQ9g919g2rR1xSrchPgaxjvAeGXgzDK9FFr21tXca6zYrBq357sHP0aH7Xjt4M_5xi2mi-81SsGpdpUqCKaKeSBd3spmDKNJ-fHeI6mmVWSuZK4bEiLWSwRJMVlzUNIt_SWrLjbvusd-phYK7URYeXQTBCKGGi42cmqlXWkNcczAWGQ17PxkpfbzECU3QrcrnV04ymlUaUNKVkdrepw7kgAirlzIanLEZCITooGw-CFkZ0Et-ipvgnoLkTzM2EaNn"/>
<span class="font-mono text-[11px] text-on-surface uppercase tracking-wider">GOOGLE</span>
</button>
<button class="glass-panel h-[50px] rounded-[20px] flex items-center justify-center gap-2 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[18px] opacity-80" data-icon="apple">ios</span>
<span class="font-mono text-[11px] text-on-surface uppercase tracking-wider">APPLE</span>
</button>
</div>
<!-- Footer -->
<div class="flex justify-center pb-12">
<a class="font-mono text-[12px] text-on-surface/60 hover:text-primary transition-colors" href="#">
                New to Crymad? <span class="text-primary font-bold ml-1 uppercase">Create Account →</span>
</a>
</div>
<!-- Home Indicator -->
<div class="fixed bottom-[8px] left-1/2 -translate-x-1/2 w-[134px] h-[5px] bg-on-surface/20 rounded-full"></div>
</main>
</body></html>
