<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-tertiary-fixed": "#2a1700",
                  "inverse-surface": "#d9e5df",
                  "on-tertiary-fixed-variant": "#653e00",
                  "inverse-primary": "#006c49",
                  "on-surface": "#d9e5df",
                  "tertiary-fixed": "#ffddb8",
                  "surface-bright": "#313b38",
                  "on-primary": "#003824",
                  "on-error-container": "#ffdad6",
                  "primary-container": "#10b981",
                  "on-error": "#690005",
                  "primary": "#4edea3",
                  "secondary": "#45dfa4",
                  "surface-container-lowest": "#06100d",
                  "primary-fixed": "#6ffbbe",
                  "primary-fixed-dim": "#4edea3",
                  "secondary-fixed": "#68fcbf",
                  "on-primary-fixed-variant": "#005236",
                  "on-primary-container": "#00422b",
                  "tertiary-container": "#e29100",
                  "inverse-on-surface": "#28332f",
                  "surface-variant": "#2c3733",
                  "on-tertiary-container": "#523200",
                  "on-primary-fixed": "#002113",
                  "secondary-fixed-dim": "#45dfa4",
                  "surface-tint": "#4edea3",
                  "surface-container-high": "#222c29",
                  "on-background": "#d9e5df",
                  "on-secondary-fixed-variant": "#005137",
                  "on-secondary-fixed": "#002114",
                  "on-secondary": "#003825",
                  "tertiary-fixed-dim": "#ffb95f",
                  "tertiary": "#ffb95f",
                  "surface-container": "#17221e",
                  "surface-dim": "#0b1512",
                  "surface-container-low": "#131e1a",
                  "background": "#0b1512",
                  "surface-container-highest": "#2c3733",
                  "error": "#ffb4ab",
                  "outline": "#86948a",
                  "surface": "#0b1512",
                  "on-tertiary": "#472a00",
                  "outline-variant": "#3c4a42",
                  "on-surface-variant": "#bbcabf",
                  "error-container": "#93000a",
                  "on-secondary-container": "#00452e",
                  "secondary-container": "#00bd85"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Inter"],
                  "body": ["Inter"],
                  "label": ["Inter"],
                  "mono": ["JetBrains Mono"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
      background: rgba(44, 55, 51, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.08);
    }
    .energy-lines {
      background-image: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.05) 0px, rgba(16, 185, 129, 0.05) 1px, transparent 1px, transparent 10px);
    }
    .glow-primary {
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }
    body {
      background-color: #040d0a;
      color: #d9e5df;
    }
    input:focus {
      outline: none;
      border-color: rgba(16, 185, 129, 0.2) !important;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary/30 selection:text-primary min-h-screen relative overflow-x-hidden">
<!-- Living Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-emerald-500/20 blur-[100px] animate-pulse"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-teal-500/15 blur-[80px]"></div>
<div class="absolute top-[30%] right-[10%] w-[30%] h-[30%] rounded-full bg-emerald-600/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[20%] w-[40%] h-[40%] rounded-full bg-teal-400/10 blur-[90px]"></div>
<div class="absolute inset-0 energy-lines opacity-50"></div>
</div>
<!-- iOS Status Bar Simulation -->
<div class="sticky top-0 w-full h-11 px-8 flex justify-between items-center z-[100] bg-[#040d0a]/60 backdrop-blur-md">
<span class="font-mono text-sm font-bold tracking-tight">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Navigation -->
<nav class="relative z-50 flex items-center px-6 py-4">
<button class="w-11 h-11 glass-panel rounded-full flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
</nav>
<main class="relative z-10 px-6 pb-24 space-y-8 max-w-[390px] mx-auto">
<!-- Header -->
<header class="space-y-1">
<h1 class="text-4xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-[#10b981] to-[#34d399]">
        Create Account
      </h1>
<p class="font-mono text-[10px] tracking-[0.2em] text-primary opacity-80 uppercase">
        JOIN THE BIOLUMINESCENT ECONOMY
      </p>
</header>
<!-- Account Toggle -->
<div class="glass-panel p-1.5 rounded-full flex gap-1 h-[52px]">
<button class="flex-1 rounded-full bg-gradient-to-r from-emerald-500 to-teal-400 text-on-primary-container font-bold text-sm transition-all shadow-lg shadow-emerald-500/20">
        PERSONAL
      </button>
<button class="flex-1 rounded-full text-on-surface-variant font-bold text-sm transition-all hover:bg-white/5">
        BUSINESS
      </button>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="group relative">
<label class="absolute left-5 top-2 font-mono text-[10px] text-primary/60 tracking-wider">EMAIL ADDRESS</label>
<div class="h-14 w-full glass-panel rounded-[20px] flex items-end px-5 pb-2 transition-all group-focus-within:ring-1 group-focus-within:ring-primary/20">
<input class="bg-transparent border-none p-0 w-full text-on-surface font-mono placeholder:text-surface-variant focus:ring-0 text-sm" placeholder="archive@bio.network" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group relative">
<label class="absolute left-5 top-2 font-mono text-[10px] text-primary/60 tracking-wider">PASSWORD</label>
<div class="h-14 w-full glass-panel rounded-[20px] flex items-end px-5 pb-2 transition-all group-focus-within:ring-1 group-focus-within:ring-primary/20">
<input class="bg-transparent border-none p-0 w-full text-on-surface font-mono focus:ring-0 text-sm" type="password" value="••••••••••••"/>
<span class="material-symbols-outlined text-surface-variant mb-1" data-icon="visibility_off">visibility_off</span>
</div>
<!-- Strength Bar -->
<div class="mt-3 px-1">
<div class="flex gap-1.5 h-1">
<div class="flex-1 bg-error rounded-full shadow-[0_0_8px_rgba(255,180,171,0.5)]"></div>
<div class="flex-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(245,158,11,0.5)]"></div>
<div class="flex-1 bg-primary rounded-full shadow-[0_0_8px_rgba(78,222,163,0.5)]"></div>
</div>
<div class="mt-2 flex justify-between items-center">
<span class="font-mono text-[9px] text-primary tracking-widest">STRENGTH: STRONG</span>
<span class="font-mono text-[9px] text-on-surface-variant opacity-60">MIN 12 CHARS</span>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="group relative">
<label class="absolute left-5 top-2 font-mono text-[10px] text-primary/60 tracking-wider">CONFIRM PASSWORD</label>
<div class="h-14 w-full glass-panel rounded-[20px] flex items-end px-5 pb-2 transition-all group-focus-within:ring-1 group-focus-within:ring-primary/20">
<input class="bg-transparent border-none p-0 w-full text-on-surface font-mono focus:ring-0 text-sm" type="password" value="••••••••••••"/>
<span class="material-symbols-outlined text-primary mb-1" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Legal Checkboxes -->
<div class="space-y-3">
<div class="flex items-center gap-4 glass-panel p-4 rounded-[20px] cursor-pointer">
<div class="w-6 h-6 rounded-lg bg-emerald-500/20 border border-primary/30 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px] font-bold" data-icon="check">check</span>
</div>
<span class="text-xs text-on-surface-variant">I accept the <span class="text-primary font-semibold">Terms of Service</span></span>
</div>
<div class="flex items-center gap-4 glass-panel p-4 rounded-[20px] cursor-pointer">
<div class="w-6 h-6 rounded-lg bg-emerald-500/20 border border-primary/30 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px] font-bold" data-icon="check">check</span>
</div>
<span class="text-xs text-on-surface-variant">I accept the <span class="text-primary font-semibold">Privacy Policy</span></span>
</div>
</div>
<!-- Disabled Business Section -->
<div class="relative opacity-40 grayscale-[0.5] glass-panel p-6 rounded-xl overflow-hidden pointer-events-none">
<div class="absolute inset-0 flex items-center justify-center z-20">
<div class="glass-panel p-3 rounded-full flex items-center justify-center bg-[#040d0a]/60">
<span class="material-symbols-outlined text-primary" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<div class="space-y-4">
<p class="font-mono text-[10px] text-on-surface-variant tracking-widest mb-2">BUSINESS ENTITY DATA</p>
<div class="h-10 w-full bg-surface-container-high rounded-lg border border-white/5"></div>
<div class="h-10 w-full bg-surface-container-high rounded-lg border border-white/5"></div>
<div class="h-10 w-full bg-surface-container-high rounded-lg border border-white/5"></div>
</div>
</div>
<!-- CTA -->
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-headline font-extrabold uppercase tracking-widest text-sm flex items-center justify-center gap-2 glow-primary active:scale-95 transition-all shadow-[0_10px_40px_rgba(16,185,129,0.2)]">
        CREATE ACCOUNT
        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<footer class="text-center pt-4 pb-8">
<p class="font-mono text-[11px] text-on-surface-variant">
        Already have an account? <a class="text-primary font-bold ml-1 active:opacity-60 transition-opacity" href="#">Sign In →</a>
</p>
</footer>
<!-- Home Indicator -->
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-on-surface/20 rounded-full z-[100]"></div>
</main>
<!-- Decor Blur Blob -->
<div class="fixed bottom-[15%] left-[-20px] w-48 h-48 bg-emerald-400/10 blur-[60px] rounded-full pointer-events-none"></div>
</body></html>
