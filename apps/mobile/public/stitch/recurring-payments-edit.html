<style>
        body {
            background-color: #040d0a;
            overflow: hidden;
        }
        .bioluminescent-blob {
            filter: blur(60px);
            opacity: 0.25;
            position: fixed;
            z-index: 0;
        }
        .energy-lines {
            background-image: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.05) 0px, rgba(16, 185, 129, 0.05) 1px, transparent 1px, transparent 20px);
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        .glass-sheet {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body text-on-surface h-screen flex flex-col items-center justify-end">
<!-- Background Elements -->
<div class="bioluminescent-blob w-80 h-80 bg-primary top-[-10%] left-[-10%]"></div>
<div class="bioluminescent-blob w-96 h-96 bg-secondary bottom-[20%] right-[-15%]"></div>
<div class="bioluminescent-blob w-64 h-64 bg-tertiary top-[40%] right-[10%]"></div>
<div class="energy-lines"></div>
<!-- Parent View Mockup (Dimmed Content) -->
<div class="fixed inset-0 z-10 flex flex-col px-6 pt-12 pb-20 opacity-30 pointer-events-none">
<div class="flex justify-between items-center mb-10">
<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>
<div class="w-24 h-4 bg-surface-container-highest rounded"></div>
<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>
</div>
<div class="h-40 w-full bg-surface-container-low rounded-lg mb-6"></div>
<div class="space-y-4">
<div class="h-16 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-16 w-full bg-surface-container-low rounded-lg"></div>
<div class="h-16 w-full bg-surface-container-low rounded-lg"></div>
</div>
</div>
<!-- Bottom Sheet Container -->
<div class="relative z-50 w-full max-w-md h-[751px] glass-sheet rounded-t-[28px] flex flex-col shadow-[0_-20px_50px_rgba(16,185,129,0.12)]">
<!-- TopAppBar (JSON Instruction Mapping) -->
<header class="flex justify-between items-center px-6 py-4 w-full sticky top-0 border-b border-[#10b981]/10 rounded-t-[32px] bg-[#040d0a]/80 backdrop-blur-xl z-[60]">
<button class="text-[#d9e5df]/60 hover:bg-[#10b981]/5 transition-colors active:scale-95 duration-300 ease-in-out p-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-['Inter'] font-extrabold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-[#10b981] to-[#34d399]">Edit Payment</h1>
<button class="text-[#10b981] brightness-125 hover:bg-[#10b981]/5 transition-colors active:scale-95 duration-300 ease-in-out p-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">check</span>
</button>
</header>
<!-- Grab Handle -->
<div class="flex justify-center py-2 shrink-0">
<div class="w-10 h-1 bg-on-surface-variant/20 rounded-full"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-24 space-y-8 scrollbar-hide">
<!-- Current Settings Header -->
<div class="flex justify-center pt-2">
<span class="font-mono text-[11px] text-on-surface-variant/80 uppercase tracking-tighter">Alex Morgan · $500 MONTHLY · 11 of 12</span>
</div>
<!-- Amount Field -->
<div class="flex flex-col items-center">
<label class="text-xs font-semibold text-on-surface-variant/60 uppercase tracking-widest mb-2">Adjust Amount</label>
<div class="relative group">
<input class="bg-transparent border-none focus:ring-0 text-5xl font-mono font-bold text-center text-transparent bg-clip-text bg-gradient-to-b from-primary to-secondary w-full" type="text" value="$500.00"/>
<div class="absolute -bottom-1 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</div>
<!-- Frequency Selection -->
<div class="space-y-4">
<h3 class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest">Billing Frequency</h3>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="shrink-0 px-4 py-2 rounded-full bg-surface-container-highest border border-primary/10 font-mono text-[10px] text-on-surface-variant/60">DAILY</button>
<button class="shrink-0 px-4 py-2 rounded-full bg-surface-container-highest border border-primary/10 font-mono text-[10px] text-on-surface-variant/60">WEEKLY</button>
<button class="shrink-0 px-4 py-3 rounded-full bg-primary/10 ring-1 ring-primary/30 font-mono text-[10px] text-primary font-bold shadow-[0_0_15px_rgba(16,185,129,0.1)]">MONTHLY</button>
<button class="shrink-0 px-4 py-2 rounded-full bg-surface-container-highest border border-primary/10 font-mono text-[10px] text-on-surface-variant/60">QUARTERLY</button>
</div>
</div>
<!-- Memo Field -->
<div class="space-y-4">
<h3 class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest">Description / Memo</h3>
<div class="bg-surface-container-lowest/50 border border-primary/5 rounded-xl px-4 py-4 flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-sm">sticky_note_2</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-sm text-on-surface w-full placeholder-on-surface-variant/30" type="text" value="Rent payment"/>
</div>
</div>
<!-- End Condition -->
<div class="space-y-4">
<h3 class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest">End Condition</h3>
<div class="flex flex-col gap-2">
<button class="flex justify-between items-center px-4 py-4 rounded-2xl bg-primary/10 ring-1 ring-primary/30">
<span class="text-xs font-bold text-primary">AFTER 12 CYCLES</span>
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="flex justify-between items-center px-4 py-4 rounded-2xl bg-surface-container-highest border border-primary/5">
<span class="text-xs font-bold text-on-surface-variant">ON DATE</span>
<span class="material-symbols-outlined text-on-surface-variant/30 text-sm">calendar_today</span>
</button>
<button class="flex justify-between items-center px-4 py-4 rounded-2xl bg-surface-container-highest border border-primary/5">
<span class="text-xs font-bold text-on-surface-variant">NEVER</span>
<span class="material-symbols-outlined text-on-surface-variant/30 text-sm">indeterminate_question_box</span>
</button>
</div>
</div>
<!-- Warning Strip -->
<div class="bg-tertiary/10 border border-tertiary/20 rounded-xl p-4 flex gap-3 items-start backdrop-blur-md shadow-[0_4px_20px_rgba(245,158,11,0.05)]">
<span class="material-symbols-outlined text-tertiary text-lg" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="text-[11px] leading-relaxed text-on-surface/90">
                    Changes apply to <span class="font-bold text-tertiary">next payment APR 18</span>. Past payments unaffected.
                </p>
</div>
</div>
<!-- Sticky Footer CTA -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#040d0a] to-transparent pointer-events-none">
<button class="pointer-events-auto w-full py-5 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary font-bold tracking-[0.1em] text-sm shadow-[0_10px_30px_rgba(16,185,129,0.3)] active:scale-[0.98] transition-transform flex justify-center items-center gap-2 group">
                SAVE CHANGES
                <span class="material-symbols-outlined text-base group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
</div>
</div>
<!-- BottomNavBar (JSON Instruction Mapping - Suppressed per Shell Visibility Rule since this is a task-focused sub-page/modal) -->
<!-- The BottomNavBar is suppressed because the user is in a focused 'Edit' journey with a 'Close' action -->
