                    "inverse-primary": "#006c49",

                    "inverse-surface": "#d9e5df",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(44, 55, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.08);
        }
        .energy-line {
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.1), transparent);
            height: 1px;
            width: 100%;
        }
        .glow-destructive {
            filter: drop-shadow(0 0 15px rgba(255, 180, 171, 0.3));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#040d0a] text-on-background font-body min-h-[844px] w-[390px] mx-auto relative overflow-hidden shadow-2xl">
<!-- Parent Screen (Blurred Background Context) -->
<div class="absolute inset-0 z-0 p-6 filter blur-md opacity-40">
<!-- Top Nav Placeholder -->
<header class="flex justify-between items-center mb-8">
<div class="h-8 w-32 bg-surface-container rounded-full"></div>
<div class="h-10 w-10 bg-surface-container rounded-full"></div>
</header>
<!-- User List Mockup -->
<div class="space-y-4">
<div class="h-20 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-20 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-20 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-20 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-20 w-full bg-surface-container-high rounded-lg"></div>
</div>
<!-- Background Blobs -->
<div class="absolute top-20 left-10 w-48 h-48 bg-primary/10 blur-[60px] rounded-full"></div>
<div class="absolute bottom-40 right-10 w-64 h-64 bg-secondary/10 blur-[80px] rounded-full"></div>
</div>
<!-- Scrim Overlay -->
<div class="absolute inset-0 z-10 bg-black/60 backdrop-blur-sm"></div>
<!-- Bottom Sheet -->
<main class="absolute bottom-0 left-0 right-0 z-20 glass-panel rounded-t-[28px] h-[85%] flex flex-col overflow-hidden">
<!-- Grab Handle -->
<div class="flex justify-center pt-3 pb-1">
<div class="w-12 h-1.5 bg-on-surface-variant/30 rounded-full"></div>
</div>
<div class="flex-1 overflow-y-auto px-6 py-4 space-y-6">
<!-- Header Section -->
<div class="flex flex-col items-center text-center space-y-4">
<div class="text-[80px] text-error glow-destructive leading-none">
<span class="material-symbols-outlined !text-[80px]">warning</span>
</div>
<div>
<h1 class="text-2xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-primary to-secondary">
                        Remove Priya Patel?
                    </h1>
<p class="font-mono text-xs font-bold tracking-widest text-on-surface-variant uppercase mt-1">
                        TREASURY · TREASURER
                    </p>
</div>
</div>
<!-- Member Preview Mini Card -->
<div class="glass-panel rounded-lg p-3 flex items-center gap-4">
<img alt="Priya Patel" class="w-12 h-12 rounded-full object-cover border border-primary/20" data-alt="Professional portrait of a woman of Indian descent in corporate attire, soft cinematic lighting against a dark neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIlvBcveqKR_hbF42c8VJAvupkTsMpMGZneOzWT8_YaRf105R2Si2TjlGfmWoaJxPGMlX9j0IEp227ARkdWKhPxouc5qU1AVGw92jFVLWLdFRFPHzY2Y_b44EfuAOqrrCR_7vrjDxc45qW3BQU7Smh99R8aH-9ztjegK4mWpKnCWF-D7fVRDUdm_Hbi_anI6_p4Yvwk1RpLIi67yOq_XJbUiJ50KHiytrDn30QG3mu6HoxfkdUym5G1v1VMv6T_-bqvEPEHrRXPHfv"/>
<div class="flex flex-col">
<span class="font-bold text-on-surface text-sm">Priya Patel</span>
<span class="font-mono text-[10px] text-on-surface-variant">p.patel@institutional.arch</span>
</div>
</div>
<!-- Warning Body -->
<p class="text-sm text-on-surface-variant leading-relaxed text-center px-4">
                This will revoke all access immediately. Audit trail preserved <span class="text-primary font-bold">7 years</span> per policy.
            </p>
<!-- Impact Section -->
<div class="rounded-lg p-4 border border-error/20 bg-error/5 space-y-2">
<div class="flex items-center gap-2 text-error text-xs font-bold uppercase tracking-wide">
<span class="material-symbols-outlined !text-sm">gpp_maybe</span>
<span>Immediate Impact</span>
</div>
<div class="space-y-1">
<div class="flex items-start gap-2 text-[11px] text-on-surface/80">
<span class="w-1 h-1 rounded-full bg-error mt-1.5"></span>
<span>2 pending approvals need reassignment</span>
</div>
<div class="flex items-start gap-2 text-[11px] text-on-surface/80">
<span class="w-1 h-1 rounded-full bg-error mt-1.5"></span>
<span>1 active session will terminate</span>
</div>
</div>
</div>
<!-- Inputs Section -->
<div class="space-y-4">
<!-- Reassign -->
<div class="space-y-1.5">
<label class="font-mono text-[10px] text-on-surface-variant uppercase tracking-tighter ml-1">to: Reassignment target</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-lowest/50 glass-panel rounded-lg px-4 text-sm text-on-surface appearance-none focus:outline-none">
<option>Assistant Treasurer</option>
<option>Senior Analyst</option>
<option>System Administrator</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3.5 text-primary text-sm">expand_more</span>
</div>
</div>
<!-- Reason -->
<div class="space-y-1.5">
<label class="font-mono text-[10px] text-on-surface-variant uppercase tracking-tighter ml-1">Reason (Required)</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-lowest/50 glass-panel rounded-lg px-4 text-sm text-on-surface appearance-none focus:outline-none">
<option disabled="" selected="" value="">Select removal reason...</option>
<option>Termination</option>
<option>Role Change</option>
<option>Security Breach</option>
<option>Other</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3.5 text-primary text-sm">expand_more</span>
</div>
</div>
<!-- Audit Notes -->
<div class="space-y-1.5">
<label class="font-mono text-[10px] text-on-surface-variant uppercase tracking-tighter ml-1">Audit Notes (Required)</label>
<textarea class="w-full bg-surface-container-lowest/50 glass-panel rounded-lg p-4 text-sm text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none resize-none" placeholder="Enter detailed removal rationale..." rows="3"></textarea>
</div>
<!-- Type to Confirm -->
<div class="space-y-1.5 pb-12">
<label class="font-mono text-[10px] text-on-surface-variant uppercase tracking-tighter ml-1">Type PRIYA PATEL to confirm</label>
<input class="w-full h-12 bg-surface-container-lowest/50 glass-panel rounded-lg px-4 text-sm text-on-surface placeholder:text-on-surface-variant/20 focus:outline-none border-0" placeholder="NAME" type="text"/>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 bg-surface-container-lowest/80 backdrop-blur-3xl border-t border-primary/10 flex gap-4">
<button class="flex-1 h-12 rounded-full font-mono text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:bg-surface-variant/50 transition-colors">
                CANCEL
            </button>
<button class="flex-[1.5] h-12 rounded-full bg-error/20 border border-error/30 text-error opacity-50 cursor-not-allowed font-bold flex items-center justify-center gap-2 text-sm">
                REMOVE USER
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</main>
<!-- Energy Lines Decorative -->
<div class="absolute top-1/4 left-0 energy-line rotate-12 pointer-events-none opacity-20"></div>
<div class="absolute bottom-1/3 right-0 energy-line -rotate-45 pointer-events-none opacity-20"></div>
</body></html>
