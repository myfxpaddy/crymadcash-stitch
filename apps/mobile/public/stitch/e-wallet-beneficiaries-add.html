<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-[#040d0a] text-on-surface font-body selection:bg-primary/30 min-h-screen flex items-center justify-center">
<!-- Parent Screen Simulation (Blurred Background Content) -->
<div class="fixed inset-0 bg-mesh opacity-40 blur-sm pointer-events-none overflow-hidden">
<div class="p-8 space-y-6">
<div class="h-48 w-full bg-surface-container-low rounded-xl ghost-border"></div>
<div class="h-12 w-3/4 bg-surface-container-low rounded-full ghost-border"></div>

</div>
<div class="h-64 w-full bg-surface-container-low rounded-xl ghost-border"></div>
</div>
</div>

<!-- iPhone Frame Container -->
<main class="relative w-[390px] h-[844px] bg-transparent overflow-hidden z-20">
<!-- TopAppBar (Shared Component Logic) -->
<header class="bg-emerald-950/40 backdrop-blur-xl text-emerald-500 border-b border-emerald-500/10 shadow-[0_0_40px_rgba(16,185,129,0.05)] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-400 active:scale-95 duration-200">arrow_back</span>
<h1 class="font-['Inter'] font-extrabold tracking-tight uppercase text-emerald-500">Vault Details</h1>
</div>
<span class="material-symbols-outlined text-emerald-700 hover:text-emerald-300 transition-colors">more_vert</span>
</header>

<div class="absolute bottom-0 left-0 w-full h-[85%] bg-emerald-950/40 backdrop-blur-2xl rounded-t-[28px] ghost-border flex flex-col z-50">
<!-- Grab Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-9 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-32">
<!-- Header -->
<div class="mb-8">
<h2 class="text-2xl font-headline font-extrabold tracking-tight uppercase gradient-text">Add Beneficiary</h2>
<p class="text-on-surface-variant text-sm mt-1">Connect a secure receiving hardware address.</p>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Full Name</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border transition-all focus-within:border-primary/20">
<input class="bg-transparent border-none p-0 w-full text-on-surface placeholder:text-surface-variant focus:ring-0 font-body" placeholder="Johnathan Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Entity Email</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border">
<input class="bg-transparent border-none p-0 w-full text-on-surface placeholder:text-surface-variant focus:ring-0 font-body" placeholder="archive.id@vault.network" type="email"/>
</div>
</div>
<!-- Bank Dropdown -->
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Bank Institution</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border flex justify-between items-center cursor-pointer">
<span class="text-on-surface">Select Hardware Node</span>
<span class="material-symbols-outlined text-primary">expand_more</span>
</div>
</div>
<!-- Account & Routing (Mono Group) -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Account</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border">
<input class="bg-transparent border-none p-0 w-full text-on-surface placeholder:text-surface-variant focus:ring-0 font-mono" placeholder="00129384" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Routing</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border">
<input class="bg-transparent border-none p-0 w-full text-on-surface placeholder:text-surface-variant focus:ring-0 font-mono" placeholder="RT-449" type="text"/>
</div>
</div>
</div>
<!-- Currency Row -->
<div class="space-y-3 pt-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Base Currency</label>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="flex-shrink-0 bg-primary/20 text-primary px-6 py-2 rounded-full border border-primary/30 font-mono text-sm">USD</button>
<button class="flex-shrink-0 bg-surface-container-lowest/50 text-on-surface-variant px-6 py-2 rounded-full ghost-border font-mono text-sm">EUR</button>
<button class="flex-shrink-0 bg-surface-container-lowest/50 text-on-surface-variant px-6 py-2 rounded-full ghost-border font-mono text-sm">GBP</button>
<button class="flex-shrink-0 bg-surface-container-lowest/50 text-on-surface-variant px-6 py-2 rounded-full ghost-border font-mono text-sm">NGN</button>
</div>
</div>
<!-- Nickname -->
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-widest text-primary/60 px-4">Alias (Optional)</label>
<div class="bg-surface-container-lowest/50 backdrop-blur-md px-5 py-4 rounded-[24px] ghost-border">
<input class="bg-transparent border-none p-0 w-full text-on-surface placeholder:text-surface-variant focus:ring-0 font-body" placeholder="Personal Vault B" type="text"/>
</div>
</div>
<!-- Verification Note -->
<div class="flex items-center gap-3 bg-primary/5 p-4 rounded-[24px] ghost-border">
<span class="material-symbols-outlined text-primary text-xl">info</span>
<p class="text-xs text-on-surface-variant leading-relaxed font-body">
                            We will send a <span class="font-mono text-primary">$0.01</span> test deposit to verify hardware integrity.
                        </p>
</div>
</div>
</div>

<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background to-transparent pt-12">
<button class="w-full bg-primary hover:bg-secondary text-on-primary py-5 rounded-full font-headline font-extrabold text-sm tracking-widest shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all duration-300 glow-button flex items-center justify-center gap-2">
                    ADD BENEFICIARY

</button>
